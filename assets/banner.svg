<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#111120"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a5b4fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="banner-clip"><rect width="900" height="320" rx="12"/></clipPath>
  </defs>

  <g clip-path="url(#banner-clip)">
    <!-- Background -->
    <rect width="900" height="320" fill="url(#bg)"/>

    <!-- Grid pattern -->
    <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.5">
      <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
      <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
      <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
      <line x1="0" y1="280" x2="900" y2="280"/>
      <line x1="100" y1="0" x2="100" y2="320"/><line x1="200" y1="0" x2="200" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
      <line x1="500" y1="0" x2="500" y2="320"/><line x1="600" y1="0" x2="600" y2="320"/>
      <line x1="700" y1="0" x2="700" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
    </g>

    <!-- Animated floating particles -->
    <circle cx="120" cy="60" r="1.5" fill="#6366f1" opacity="0.6">
      <animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="90" r="1" fill="#818cf8" opacity="0.4">
      <animate attributeName="cy" values="90;75;90" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="250" r="1.5" fill="#6366f1" opacity="0.5">
      <animate attributeName="cy" values="250;240;250" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="270" r="1" fill="#a5b4fc" opacity="0.3">
      <animate attributeName="cy" values="270;260;270" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="40" r="2" fill="#6366f1" opacity="0.4">
      <animate attributeName="cy" values="40;30;40" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="180" r="1" fill="#818cf8" opacity="0.5">
      <animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="200" r="1.5" fill="#6366f1" opacity="0.3">
      <animate attributeName="cy" values="200;188;200" dur="5.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Shield icon with glow -->
    <g transform="translate(350, 55)" filter="url(#glow)">
      <path d="M50 0 L95 20 L95 55 C95 85 75 110 50 120 C25 110 5 85 5 55 L5 20 Z"
            fill="url(#accent)" opacity="0.15" stroke="url(#accent)" stroke-width="1.5">
        <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite"/>
      </path>
      <!-- Lock symbol inside shield -->
      <rect x="35" y="52" width="30" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
      </rect>
      <path d="M42 52 V44 C42 37 50 30 58 37 V52" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round">
        <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
      </path>
      <circle cx="50" cy="64" r="3" fill="#a5b4fc">
        <animate attributeName="r" values="3;3.5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Main title with shimmer -->
    <text x="450" y="215" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="48" font-weight="700" fill="#f4f4fb" letter-spacing="-1">
      Prompt-Armor
    </text>
    <!-- Shimmer overlay on title -->
    <text x="450" y="215" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="48" font-weight="700" fill="url(#shimmer)" letter-spacing="-1">
      Prompt-Armor
    </text>

    <!-- Subtitle -->
    <text x="450" y="252" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="14" fill="#6b6b80" letter-spacing="0.5">
      Write-protection for AI prompts
    </text>

    <!-- Animated line separator -->
    <line x1="300" y1="275" x2="600" y2="275" stroke="#2a2a33" stroke-width="1"/>
    <line x1="300" y1="275" x2="600" y2="275" stroke="url(#shimmer)" stroke-width="1.5"/>

    <!-- Version badge -->
    <g transform="translate(390, 288)">
      <rect width="120" height="22" rx="11" fill="#1a1a2e" stroke="#2a2a33" stroke-width="1"/>
      <text x="60" y="15" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="10" fill="#6366f1" font-weight="500">
        v1.0 -- Open Source
      </text>
    </g>
  </g>
</svg>
