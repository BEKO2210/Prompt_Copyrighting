<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" fill="none">
  <defs>
    <linearGradient id="ts-bg" x1="0" y1="0" x2="900" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0b"/><stop offset="100%" stop-color="#0f0f14"/>
    </linearGradient>
    <linearGradient id="ts-pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="2 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="900" height="60" rx="10" fill="url(#ts-bg)" stroke="#2a2a33" stroke-width="1"/>
  <rect width="900" height="60" rx="10" fill="url(#ts-pulse)"/>

  <!-- Astro -->
  <g transform="translate(60, 14)">
    <rect width="120" height="32" rx="16" fill="#1a1a2e" stroke="#ff5d01" stroke-width="1" stroke-opacity="0.5"/>
    <text x="60" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff5d01" font-weight="600">Astro 5</text>
  </g>
  <!-- Tailwind -->
  <g transform="translate(200, 14)">
    <rect width="150" height="32" rx="16" fill="#1a1a2e" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5"/>
    <text x="75" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" font-weight="600">Tailwind v4</text>
  </g>
  <!-- TypeScript -->
  <g transform="translate(370, 14)">
    <rect width="140" height="32" rx="16" fill="#1a1a2e" stroke="#3178c6" stroke-width="1" stroke-opacity="0.5"/>
    <text x="70" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#3178c6" font-weight="600">TypeScript</text>
  </g>
  <!-- Web Crypto -->
  <g transform="translate(530, 14)">
    <rect width="150" height="32" rx="16" fill="#1a1a2e" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.5"/>
    <text x="75" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc" font-weight="600">Web Crypto</text>
  </g>
  <!-- PWA -->
  <g transform="translate(700, 14)">
    <rect width="140" height="32" rx="16" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" stroke-opacity="0.5"/>
    <text x="70" y="21" text-anchor="middle" font-family="monospace" font-size="11" fill="#6366f1" font-weight="600">PWA Ready</text>
  </g>
</svg>
